<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Curriculum Reference – Ethiopian New Curriculum Grades 9–12</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--math:#6366f1;--math-light:#eef2ff;--physics:#f59e0b;--physics-light:#fffbeb;--chemistry:#10b981;--chemistry-light:#ecfdf5;--biology:#ef4444;--biology-light:#fef2f2;--g50:#f9fafb;--g100:#f3f4f6;--g200:#e5e7eb;--g300:#d1d5db;--g400:#9ca3af;--g500:#6b7280;--g600:#4b5563;--g700:#374151;--g800:#1f2937;--g900:#111827}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;background:var(--g100);color:var(--g800);line-height:1.65;font-size:15px}
.app{display:flex;min-height:100vh}
.sidebar{width:280px;background:var(--g900);color:#fff;padding:1.5rem 0;position:fixed;top:0;left:0;bottom:0;overflow-y:auto;z-index:100;flex-shrink:0}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-thumb{background:var(--g600);border-radius:4px}
.sidebar h2{font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;color:var(--g400);padding:0 1.5rem .5rem;font-weight:600}
.sidebar .brand{padding:0 1.5rem 1.25rem;border-bottom:1px solid var(--g700);margin-bottom:1rem}
.sidebar .brand h1{font-size:1rem;font-weight:700;color:#fff}
.sidebar .brand p{font-size:.75rem;color:var(--g400);margin-top:.2rem}
.nav-main{margin-bottom:1rem}
.nav-main a{display:block;padding:.45rem 1.5rem;color:var(--g400);text-decoration:none;font-size:.825rem;font-weight:500;border-left:3px solid transparent;transition:all .15s;cursor:pointer}
.nav-main a:hover{background:rgba(255,255,255,.05);color:#fff}
.nav-main a.active{border-left-color:#fff;color:#fff;font-weight:600}
.nav-divider{height:1px;background:var(--g700);margin:0 1.5rem 1rem}
.sidebar nav a{display:block;padding:.4rem 1.5rem;color:var(--g300);text-decoration:none;font-size:.825rem;border-left:3px solid transparent;transition:all .15s}
.sidebar nav a:hover{background:rgba(255,255,255,.05);color:#fff}
.sidebar nav a.sm{border-left-color:var(--math)}
.sidebar nav a.sp{border-left-color:var(--physics)}
.sidebar nav a.sc{border-left-color:var(--chemistry)}
.sidebar nav a.sb{border-left-color:var(--biology)}
.sidebar nav a.grade{font-weight:600;color:#fff;margin-top:.5rem}
.sidebar nav a.unit{padding-left:2.5rem;font-size:.8rem}
.main{margin-left:280px;flex:1;padding:2rem 3rem 4rem;max-width:960px}
.page{display:none}
.page.active{display:block;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.top-bar{position:sticky;top:0;background:rgba(243,244,246,.92);backdrop-filter:blur(8px);padding:1rem 0 .75rem;margin-bottom:1.5rem;z-index:50;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem}
.top-bar h1{font-size:1.15rem;font-weight:700;color:var(--g900)}
.top-bar .meta{font-size:.78rem;color:var(--g500)}
.top-bar .legend{display:flex;gap:.5rem;flex-wrap:wrap}
.top-bar .legend span{display:inline-flex;align-items:center;gap:.3rem;font-size:.72rem;font-weight:600}
.top-bar .legend .dot{width:10px;height:10px;border-radius:50%;display:inline-block}
.st{display:none;background:var(--g800);color:#fff;border:none;padding:.4rem .75rem;border-radius:6px;font-size:.85rem;cursor:pointer}
.st:hover{background:var(--g700)}
.section-title{font-size:1.1rem;font-weight:700;margin-bottom:1rem;color:var(--g800)}
.section-sub{font-size:.82rem;color:var(--g500);margin-top:-.5rem;margin-bottom:1rem}
/* Dashboard */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:2rem}
.stat-card{background:#fff;border-radius:12px;padding:1.25rem;border:1px solid var(--g200);text-align:center}
.stat-card .num{font-size:2.2rem;font-weight:800;line-height:1.2;color:var(--g900)}
.stat-card .label{font-size:.78rem;color:var(--g500);font-weight:500;margin-top:.25rem}
.stat-card .sub{font-size:.7rem;color:var(--g400);margin-top:.15rem}
.subj-breakdown{background:#fff;border-radius:12px;border:1px solid var(--g200);padding:1.5rem;margin-bottom:2rem}
.subj-bar{display:flex;align-items:center;gap:1rem;margin-bottom:.5rem}
.subj-bar .name{width:75px;font-weight:700;font-size:.85rem;flex-shrink:0}
.subj-bar .track{flex:1;height:24px;background:var(--g100);border-radius:6px;overflow:hidden}
.subj-bar .track .seg{height:100%;border-radius:6px;transition:width .6s ease;min-width:4px}
.subj-bar .count{width:55px;text-align:right;font-size:.8rem;color:var(--g500);flex-shrink:0}
.grade-badges{display:flex;gap:.35rem;margin-bottom:1rem;margin-left:calc(75px + 1rem)}
.grade-badges:last-child{margin-bottom:0}
.badge{display:inline-block;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;background:var(--g100);color:var(--g600)}
.chart-wrap{background:#fff;border-radius:12px;border:1px solid var(--g200);padding:1.5rem;margin-bottom:2rem}
.chart-svg{width:100%;height:auto;display:block}
.chart-legend{display:flex;gap:1rem;justify-content:center;margin-top:.75rem;flex-wrap:wrap}
.chart-legend span{display:inline-flex;align-items:center;gap:.3rem;font-size:.75rem;font-weight:600}
.chart-legend .dot{width:10px;height:10px;border-radius:50%;display:inline-block}
/* Subject tabs */
.subj-tabs{display:flex;gap:.5rem;margin-bottom:1.5rem;flex-wrap:wrap}
.subj-tab{padding:.5rem 1.25rem;border:2px solid var(--g200);background:#fff;border-radius:8px;font-weight:600;font-size:.85rem;cursor:pointer;transition:all .15s;color:var(--g600)}
.subj-tab:hover{border-color:var(--g300)}
.subj-tab.active{border-color:var(--tab-color);color:var(--tab-color);background:var(--g50)}
.grade-tabs{display:flex;gap:.35rem;margin-bottom:1.25rem;flex-wrap:wrap}
.grade-tab{padding:.35rem .9rem;border:1.5px solid var(--g200);background:#fff;border-radius:6px;font-weight:600;font-size:.78rem;cursor:pointer;transition:all .15s;color:var(--g500)}
.grade-tab:hover{border-color:var(--g300);color:var(--g700)}
.grade-tab.active{background:var(--g800);border-color:var(--g800);color:#fff}
/* Subject page */
.subject-section{margin-bottom:2rem}
.subject-header{display:flex;align-items:center;gap:.75rem;margin-bottom:1.25rem;padding-bottom:.75rem;border-bottom:3px solid}
.subject-header h2{font-size:1.5rem;font-weight:800}
.sbj{display:inline-block;padding:.15rem .6rem;border-radius:4px;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:#fff}
.sm .sbj{background:var(--math)}
.sp .sbj{background:var(--physics)}
.sc .sbj{background:var(--chemistry)}
.sb .sbj{background:var(--biology)}
.grade-block{margin-bottom:2rem;position:relative}
.grade-connector{display:flex;justify-content:center;padding:.25rem 0;color:var(--g300);font-size:1rem}
.grade-title{font-size:1.2rem;font-weight:700;margin-bottom:1rem;padding:.5rem 1rem;border-radius:8px;background:var(--g50);border:1px solid var(--g200)}
.unit-card{background:#fff;border-radius:10px;border:1px solid var(--g200);margin-bottom:1rem;overflow:hidden;transition:box-shadow .2s}
.unit-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.08)}
.unit-card-header{padding:1rem 1.25rem;cursor:pointer;display:flex;align-items:center;justify-content:space-between;user-select:none}
.unit-card-header h3{font-size:1rem;font-weight:600}
.unit-card-header .tog{font-size:.75rem;color:var(--g400);transition:transform .2s;flex-shrink:0;margin-left:1rem}
.unit-card.cl .tog{transform:rotate(-90deg)}
.unit-card.cl .top{display:none}
.unit-card-body{padding:0 1.25rem 1.25rem}
.ov{font-style:italic;color:var(--g500);font-size:.875rem;margin-bottom:.75rem;padding:.5rem .75rem;background:var(--g50);border-radius:6px;border-left:3px solid var(--g300)}
.top{margin-bottom:1rem}
.top:last-child{margin-bottom:0}
.top h4{font-size:.9rem;font-weight:600;margin-bottom:.25rem;color:var(--g700)}
.top ul{list-style:none;padding:0}
.top li{position:relative;padding-left:1rem;font-size:.85rem;color:var(--g600);line-height:1.55}
.top li::before{content:"–";position:absolute;left:0;color:var(--g400)}
.lbl{font-weight:600;color:var(--g700)}
.fml{font-family:'Times New Roman','CMU Serif',serif;font-style:italic;color:var(--g800);background:var(--g50);padding:.1rem .4rem;border-radius:3px;font-size:.9rem}
.kt{display:inline-block;background:var(--g100);padding:0 .4rem;border-radius:3px;font-size:.8rem;color:var(--g600);font-weight:500}
.sm .unit-card-header{background:var(--math-light)}
.sm .unit-card-header h3{color:var(--math)}
.sm .ov{border-left-color:var(--math)}
.sm .subject-header{border-bottom-color:var(--math)}
.sp .unit-card-header{background:var(--physics-light)}
.sp .unit-card-header h3{color:var(--physics)}
.sp .ov{border-left-color:var(--physics)}
.sp .subject-header{border-bottom-color:var(--physics)}
.sc .unit-card-header{background:var(--chemistry-light)}
.sc .unit-card-header h3{color:var(--chemistry)}
.sc .ov{border-left-color:var(--chemistry)}
.sc .subject-header{border-bottom-color:var(--chemistry)}
.sb .unit-card-header{background:var(--biology-light)}
.sb .unit-card-header h3{color:var(--biology)}
.sb .ov{border-left-color:var(--biology)}
.sb .subject-header{border-bottom-color:var(--biology)}
/* Study plan 65-day */
.schedule{background:#fff;border-radius:12px;border:1px solid var(--g200);padding:1.5rem;margin-bottom:2rem;overflow-x:auto}
.schedule table{width:100%;border-collapse:collapse;min-width:600px}
.schedule th,.schedule td{padding:.55rem .7rem;text-align:left;border-bottom:1px solid var(--g100);font-size:.78rem}
.schedule th{background:var(--g50);font-weight:600;font-size:.68rem;text-transform:uppercase;color:var(--g500);letter-spacing:.04em}
.schedule td:first-child{font-weight:600;color:var(--g700);white-space:nowrap}
.schedule td:nth-child(3){font-weight:500}
.slot{display:inline-block;padding:.15rem .5rem;border-radius:4px;font-weight:600;font-size:.72rem;color:#fff;white-space:nowrap}
.slot.sm{background:var(--math)}
.slot.sp{background:var(--physics)}
.slot.sc{background:var(--chemistry)}
.slot.sb{background:var(--biology)}
.slot.rv{background:var(--g400)}
.slot.rs{background:var(--g200);color:var(--g500)}
.day-sched{background:#fff;border-radius:12px;border:1px solid var(--g200);padding:1.5rem;margin-bottom:2rem}
.day-sched .row{display:flex;align-items:center;padding:.5rem 0;border-bottom:1px solid var(--g100);gap:1rem}
.day-sched .row:last-child{border-bottom:none}
.day-sched .time{width:100px;font-weight:600;font-size:.8rem;color:var(--g700);flex-shrink:0}
.day-sched .desc{flex:1;font-size:.82rem;color:var(--g600)}
.day-sched .dur{font-size:.72rem;color:var(--g400);width:50px;text-align:right;flex-shrink:0}
.day-sched .row-header{background:var(--g50);margin:0 -1.5rem;padding:.5rem 1.5rem;border-bottom:1px solid var(--g200);font-weight:700;font-size:.85rem;color:var(--g800)}
.plan-week{margin-bottom:1.5rem}
.plan-week h4{font-size:.9rem;font-weight:700;margin-bottom:.5rem;color:var(--g800);display:flex;align-items:center;gap:.5rem}
.plan-week .tag{display:inline-block;font-size:.65rem;font-weight:600;padding:.1rem .4rem;border-radius:3px;color:#fff}
.plan-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
.plan-subj{background:var(--g50);border-radius:8px;padding:.6rem .8rem;border:1px solid var(--g200)}
.plan-subj .pname{font-size:.78rem;font-weight:700;margin-bottom:.2rem}
.plan-subj .punits{font-size:.75rem;color:var(--g500)}
.totals-row{display:flex;gap:1rem;flex-wrap:wrap;margin-top:.75rem;padding:.5rem .8rem;background:var(--g50);border-radius:8px;font-size:.78rem;color:var(--g600)}
.totals-row strong{color:var(--g800)}
/* Flow chart */
.flow-wrap{background:#fff;border-radius:12px;border:1px solid var(--g200);padding:1.5rem;margin-bottom:2rem;overflow-x:auto}
.flow-svg{display:block;width:100%;height:auto}
.flow-box{cursor:pointer;transition:opacity .2s}
.flow-box:hover{opacity:.85}
.flow-box rect{stroke-width:1.5;transition:stroke-width .15s}
.flow-box:hover rect{stroke-width:2.5}
.flow-label{font-size:9px;font-weight:600;text-anchor:middle;pointer-events:none}
.flow-sub{font-size:7px;text-anchor:middle;fill:var(--g500);pointer-events:none}
.flow-arrow{fill:none;stroke-width:1.8;stroke-linejoin:round;opacity:.7}
.flow-arrow-hl{fill:none;stroke-width:2.5;opacity:1}
.flow-edge-label{font-size:7px;text-anchor:middle;fill:var(--g600);font-style:italic}
.grade-col-line{stroke:var(--g100);stroke-width:1;stroke-dasharray:4,3}
.grade-col-title{font-size:12px;font-weight:700;text-anchor:middle;fill:var(--g700)}
/* Bottom nav */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--g200);z-index:200;justify-content:space-around;padding:.3rem 0 env(safe-area-inset-bottom,.3rem);box-shadow:0 -2px 12px rgba(0,0,0,.06)}
.bottom-nav a{display:flex;flex-direction:column;align-items:center;gap:.1rem;padding:.2rem .5rem;color:var(--g400);text-decoration:none;font-size:.58rem;font-weight:600;text-transform:uppercase;letter-spacing:.04em;cursor:pointer;transition:color .15s;border:none;background:none}
.bottom-nav a:hover{color:var(--g600)}
.bottom-nav a.active{color:var(--g800)}
.bottom-nav a .nav-icon{width:20px;height:20px;display:flex;align-items:center;justify-content:center}
.bottom-nav a .nav-icon svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.bottom-nav a.active .nav-icon svg{stroke-width:2.5}
@media(max-width:768px){
.sidebar{transform:translateX(-100%);transition:transform .25s}
.sidebar.open{transform:translateX(0)}
.main{margin-left:0;padding:1rem 1.25rem 5rem}
.st{display:inline-flex;align-items:center;gap:.4rem}
.bottom-nav{display:flex}
.subject-header h2{font-size:1.2rem}
.unit-card-header{padding:.75rem 1rem}
.unit-card-body{padding:0 1rem 1rem}
.stats-grid{grid-template-columns:repeat(2,1fr)}
.stat-card{padding:1rem}
.stat-card .num{font-size:1.6rem}
.grade-badges{margin-left:0}
.subj-bar{flex-wrap:wrap;gap:.5rem}
.subj-bar .name{width:auto}
.subj-bar .count{width:auto}
.plan-grid{grid-template-columns:1fr}
.schedule td,.schedule th{padding:.4rem .5rem;font-size:.7rem}
}
@media(max-width:480px){
.stats-grid{grid-template-columns:repeat(2,1fr);gap:.6rem}
.stat-card{padding:.75rem}
.main{padding:.75rem .75rem 5rem}
}
</style>
</head>

// ═══ HELPERS ═══
function uid(s){return s.key+'-u'}
function unitById(id){for(const s of C)for(const g of s.g)for(const u of g.u)if(u.i===id)return u;return null}
function getGradeOfUnit(id){for(const s of C)for(const g of s.g)for(const u of g.u)if(u.i===id)return g.n;return null}
const colorMap={math:'var(--math)',physics:'var(--physics)',chemistry:'var(--chemistry)',biology:'var(--biology)'};
const clsMap={math:'sm',physics:'sp',chemistry:'sc',biology:'sb'};

// ═══ STATS ═══
function getStats(){
let tu=0,tt=0;
const subs=C.map(s=>{
let su=0,st=0;
const gs=s.g.map(g=>{
const uc=g.u.length;
const tc=g.u.reduce((a,u)=>a+u.p.length,0);
su+=uc;st+=tc;
return{grade:g.n,units:uc,topics:tc};
});
tu+=su;tt+=st;
return{key:s.k,cls:s.c,name:s.s,full:s.n,grades:gs,units:su,topics:st};
});
return{subjects:subs,totalUnits:tu,totalTopics:tt,totalSubjects:C.length};
}

// ═══ RENDER: DASHBOARD ═══
function renderDashboard(){
const st=getStats();
let h='';
h+=`<div class="stats-grid">
<div class="stat-card"><div class="num">${st.totalUnits}</div><div class="label">Total Units</div><div class="sub">Across all subjects</div></div>
<div class="stat-card"><div class="num">${st.totalSubjects}</div><div class="label">Subjects</div><div class="sub">${st.subjects.map(s=>s.name).join(' · ')}</div></div>
<div class="stat-card"><div class="num">${st.totalTopics}</div><div class="label">Topics</div><div class="sub">Within all units</div></div>
<div class="stat-card"><div class="num">9–12</div><div class="label">Grades</div><div class="sub">Complete coverage</div></div>
</div>`;
h+=`<div class="subj-breakdown"><h3 class="section-title">Subject Breakdown</h3>`;
const maxU=Math.max(...st.subjects.map(s=>s.units));
for(const s of st.subjects){
h+=`<div class="subj-bar"><div class="name" style="color:${colorMap[s.key]}">${s.full}</div>
<div class="track"><div class="seg" style="width:${(s.units/maxU)*100}%;background:${colorMap[s.key]}"></div></div>
<div class="count">${s.units} units</div></div>
<div class="grade-badges">`;
for(const g of s.grades)h+=`<span class="badge">G${g.grade}: ${g.units}u</span>`;
h+=`</div>`;
}
h+=`</div>`;
const grades=[9,10,11,12];
const maxGradeU=Math.max(...grades.map(g=>st.subjects.reduce((a,s)=>{const gr=s.grades.find(g2=>g2.grade===g);return a+(gr?gr.units:0);},0)));
h+=`<div class="chart-wrap"><h3 class="section-title">Units per Grade</h3>
<svg class="chart-svg" viewBox="0 0 400 190" xmlns="http://www.w3.org/2000/svg">`;
const barW=180/grades.length/4,gap=2,gGap=6,chartH=130,baseY=170;
const col=[colorMap.math,colorMap.physics,colorMap.chemistry,colorMap.biology];
for(let gi=0;gi<grades.length;gi++){
const g=grades[gi];
const gX=40+gi*(180/grades.length+gGap)+(180/grades.length-4*barW-3*gap)/2;
for(let si=0;si<st.subjects.length;si++){
const s=st.subjects[si];
const gr=s.grades.find(g2=>g2.grade===g);
const uc=gr?gr.units:0;
const barH=chartH*(uc/maxGradeU);
const x=gX+si*(barW+gap),y=baseY-barH;
h+=`<rect x="${x}" y="${y}" width="${barW}" height="${barH||1}" rx="2" fill="${col[si]}" opacity="0.85"/>`;
}
h+=`<text x="${gX+2*barW+1.5*gap}" y="${baseY+14}" text-anchor="middle" font-size="11" fill="var(--g600)" font-weight="600">G${g}</text>`;
}
h+=`<text x="20" y="${baseY}" text-anchor="end" font-size="9" fill="var(--g400)">0</text>`;
h+=`<text x="20" y="${baseY-chartH/2}" text-anchor="end" font-size="9" fill="var(--g400)">${Math.round(maxGradeU/2)}</text>`;
h+=`<text x="20" y="${baseY-chartH+4}" text-anchor="end" font-size="9" fill="var(--g400)">${maxGradeU}</text>`;
h+=`</svg><div class="chart-legend">`;
for(let si=0;si<st.subjects.length;si++)h+=`<span><span class="dot" style="background:${col[si]}"></span>${st.subjects[si].name}</span>`;
h+=`</div></div>`;
document.getElementById('page-dashboard').innerHTML=h;
}

// ═══ RENDER: SUBJECTS ═══
function renderUnitCard(u){
let h=`<div class="unit-card" id="${u.i}"><div class="unit-card-header" onclick="this.parentElement.classList.toggle('cl')"><h3>Unit ${u.n} – ${u.t}</h3><span class="tog">▼</span></div><div class="unit-card-body"><div class="ov">${u.o}</div>`;
for(const p of u.p){
h+=`<div class="top"><h4>${p.n} ${p.t}</h4><ul>`;
for(const it of p.i){
if(typeof it==='string'){h+=`<li>${it}</li>`;continue;}
const lbl=it[0],val=it[1];
if(it.length===3&&it[2]==='fml'){
let t='';for(const f of val)t+=`<span class="fml">${f}</span> `;
h+=`<li><span class="lbl">${lbl}:</span> ${t}</li>`;
}else if(it.length===3&&it[2]==='kt'){
let t='';for(const k of val)t+=`<span class="kt">${k}</span> `;
h+=`<li><span class="lbl">${lbl}:</span> ${t}</li>`;
}else{h+=`<li><span class="lbl">${lbl}:</span> ${val}</li>`;}
}
h+=`</ul></div>`;
}
h+=`</div></div>`;
return h;
}

function renderSubjectContent(key,grade){
const s=C.find(x=>x.k===key);
if(!s)return '';
let h='';
h+=`<div class="subject-section ${clsMap[key]}"><div class="subject-header" style="border-bottom-color:${colorMap[key]}"><span class="sbj">${s.s}</span><h2>${s.n}</h2></div>`;
const grades=grade?s.g.filter(g=>g.n===grade):s.g;
for(const g of grades){
h+=`<div class="grade-block" id="${g.a}"><div class="grade-title">Grade ${g.n}</div>`;
for(const u of g.u)h+=renderUnitCard(u);
if(grades.length>1)h+=`<div class="grade-connector">↓</div>`;
h+=`</div>`;
}
h+=`</div>`;
return h;
}

function renderFlowChart(key){
const s=C.find(x=>x.k===key);
if(!s)return;
const edges=R[key]||[];
const grades=[9,10,11,12];
const colW=150,colGap=20,marginL=30,marginR=30,marginT=50,boxH=32,boxGap=8;
const totalW=grades.length*colW+(grades.length-1)*colGap+marginL+marginR;
// Build per-grade unit lists
const unitsByGrade={};
for(const g of s.g)unitsByGrade[g.n]=g.u;
const maxUnits=Math.max(...grades.map(g=>(unitsByGrade[g]||[]).length));
const totalH=Math.max(200,maxUnits*(boxH+boxGap)+marginT+20);
// Build position map
const pos={};
for(let gi=0;gi<grades.length;gi++){
const gn=grades[gi];
const uList=unitsByGrade[gn]||[];
const cx=marginL+gi*(colW+colGap)+colW/2;
for(let ui=0;ui<uList.length;ui++){
const u=uList[ui];
pos[u.i]={x:cx,y:marginT+ui*(boxH+boxGap)+boxH/2,grade:gn,idx:ui,total:uList.length};
}
}
let svg=`<svg class="flow-svg" viewBox="0 0 ${totalW} ${totalH}" xmlns="http://www.w3.org/2000/svg">
<defs><marker id="arrow-${key}" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="${colorMap[key]}" opacity="0.6"/></marker></defs>`;
// Grade column lines and titles
for(let gi=0;gi<grades.length;gi++){
const gn=grades[gi];
const cx=marginL+gi*(colW+colGap)+colW/2;
svg+=`<line x1="${cx}" y1="${marginT-20}" x2="${cx}" y2="${totalH-10}" class="grade-col-line"/>`;
svg+=`<text x="${cx}" y="${marginT-25}" class="grade-col-title">Grade ${gn}</text>`;
}
// Draw edges
for(const e of edges){
const from=pos[e.from],to=pos[e.to];
if(!from||!to)continue;
const x1=from.x+colW/2-4,y1=from.y,x2=to.x-colW/2+4,y2=to.y;
const cy=(y1+y2)/2;
let d;
if(from.grade===to.grade){
d=`M${x1},${y1} C${x1+40},${y1} ${x2-40},${y2} ${x2},${y2}`;
}else{
const dx=x2-x1;
d=`M${x1},${y1} C${x1+dx*0.4},${y1} ${x2-dx*0.4},${y2} ${x2},${y2}`;
}
svg+=`<path d="${d}" class="flow-arrow" stroke="${colorMap[key]}" marker-end="url(#arrow-${key})"/>`;
const lx=(x1+x2)/2,ly=(y1+y2)/2-6;
svg+=`<text x="${lx}" y="${ly}" class="flow-edge-label" fill="${colorMap[key]}">${e.label}</text>`;
}
// Draw unit boxes
for(const g of s.g)for(const u of g.u){
const p=pos[u.i];
if(!p)continue;
const x=p.x-colW/2+4,y=p.y-boxH/2,w=colW-8;
svg+=`<g class="flow-box" onclick="document.getElementById('${u.i}').scrollIntoView({behavior:'smooth',block:'center'})">`;
svg+=`<rect x="${x}" y="${y}" width="${w}" height="${boxH}" rx="6" fill="#fff" stroke="${colorMap[key]}" stroke-width="1.5"/>`;
const shortT=u.t.length>24?u.t.slice(0,23)+'…':u.t;
svg+=`<text x="${x+w/2}" y="${y+14}" class="flow-label" fill="var(--g800)">U${u.n}: ${shortT.slice(0,28)}</text>`;
svg+=`<text x="${x+w/2}" y="${y+26}" class="flow-sub">Grade ${getGradeOfUnit(u.i)}</text>`;
svg+=`</g>`;
}
svg+=`</svg>`;
document.getElementById('flowContent').innerHTML=`<div class="flow-wrap"><p class="section-sub">Click any unit box to jump to its details · Arrows show prerequisite/relationship flow</p>${svg}</div>`;
}

function renderLegend(){

// ═══ ROUTING ═══
let currentPage='dashboard',currentSubject='math',currentGrade=9,pendingAnchor=null;

function showPage(name){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
const page=document.getElementById('page-'+name);
if(page)page.classList.add('active');
document.querySelectorAll('.nav-main a').forEach(a=>a.classList.toggle('active',a.dataset.page===name));
document.querySelectorAll('.bottom-nav a').forEach(a=>a.classList.toggle('active',a.dataset.page===name));
if(name==='dashboard')renderDashboard();
else if(name==='subjects'){renderSubjectsPage(currentSubject,pendingAnchor);pendingAnchor=null;}
else if(name==='flow')renderFlowPage(currentSubject);
else if(name==='studyplan')renderStudyPlan();
currentPage=name;
document.getElementById('sidebar').classList.remove('open');
}

function showSubject(key,anchor){
currentSubject=key;pendingAnchor=anchor||null;showPage('subjects');
}

function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');}

// ═══ INIT ═══
document.addEventListener('DOMContentLoaded',()=>{
document.getElementById('legend').innerHTML=renderLegend();
document.querySelectorAll('.nav-main a').forEach(a=>{a.addEventListener('click',e=>{e.preventDefault();showPage(a.dataset.page);});});
document.querySelectorAll('.bottom-nav a').forEach(a=>{a.addEventListener('click',e=>{e.preventDefault();showPage(a.dataset.page);});});
showPage('dashboard');
});
</script>
